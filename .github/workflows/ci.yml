name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Typecheck + Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: application/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint || echo "lint warnings allowed in MVP"

      - name: Guard hardcode + mock
        run: pnpm guard

      - name: Unit tests (Vitest)
        run: pnpm test
