# Local Postgres for the Competency Framework app.
# Use this when you don't want managed Supabase DB.
# Run: docker compose up -d
# Stop: docker compose down
# Reset: docker compose down -v   (wipes data volume)

services:
  postgres:
    image: postgres:16-alpine
    container_name: competency-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: competency
      # Enable pgcrypto + uuid extensions used by Drizzle schema (gen_random_uuid())
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    ports:
      # Mapped to host 5433 to avoid conflict with other local Postgres on 5432
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d competency']
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin web UI on http://localhost:5050
  # Uncomment if you want browser DB management.
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: competency-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@local.dev
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - '5050:80'
  #   depends_on:
  #     - postgres

volumes:
  postgres_data:
    driver: local
